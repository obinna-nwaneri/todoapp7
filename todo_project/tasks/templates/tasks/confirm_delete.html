{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Delete Task</h2>
        <p>Are you sure you want to delete the task <strong>{{ task.title|escape }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'tasks:dashboard' %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
