{% extends "base.html" %}
{% block title %}Delete Task | To-Do App{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h1 class="h4 mb-3">Delete Task</h1>
        <p>Are you sure you want to delete the task <strong>{{ task.title }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <a class="btn btn-outline-secondary" href="{% url 'tasks:dashboard' %}">Cancel</a>
          <button type="submit" class="btn btn-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
