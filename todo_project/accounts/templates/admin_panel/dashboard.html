{% extends "base.html" %}
{% block title %}Admin Dashboard | To-Do App{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Admin Dashboard</h1>
  <a class="btn btn-outline-secondary" href="{%- url 'admin:index' -%}">Open Django Admin</a>
</div>
<div class="row g-3 mb-4">
  <div class="col-md-3">
    <div class="card text-bg-primary shadow-sm">
      <div class="card-body">
        <h2 class="h6 text-uppercase">Total Users</h2>
        <p class="display-6 fw-bold mb-0" data-count="{{ total_users }}">0</p>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-bg-success shadow-sm">
      <div class="card-body">
        <h2 class="h6 text-uppercase">Total Tasks</h2>
        <p class="display-6 fw-bold mb-0" data-count="{{ total_tasks }}">0</p>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-bg-warning shadow-sm">
      <div class="card-body">
        <h2 class="h6 text-uppercase">Pending</h2>
        <p class="display-6 fw-bold mb-0" data-count="{{ pending_count }}">0</p>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-bg-info shadow-sm">
      <div class="card-body">
        <h2 class="h6 text-uppercase">In Progress</h2>
        <p class="display-6 fw-bold mb-0" data-count="{{ in_progress_count }}">0</p>
      </div>
    </div>
  </div>
</div>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card text-bg-secondary shadow-sm">
      <div class="card-body">
        <h2 class="h6 text-uppercase">Completed</h2>
        <p class="display-6 fw-bold mb-0" data-count="{{ completed_count }}">0</p>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const counters = document.querySelectorAll('[data-count]');
    counters.forEach((counter) => {
      const target = parseInt(counter.getAttribute('data-count'), 10) || 0;
      let current = 0;
      const increment = Math.max(1, Math.floor(target / 30));
      const interval = setInterval(() => {
        current += increment;
        if (current >= target) {
          current = target;
          clearInterval(interval);
        }
        counter.textContent = current;
      }, 30);
    });
  });
</script>
{% endblock %}
