{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" autofocus required id="id_username" class="form-control" value="{{ form.username.value|default:'' }}">
                {% for error in form.username.errors %}
                <div class="text-danger small">{{ error }}</div>
                {% endfor %}
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control">
                {% for error in form.password.errors %}
                <div class="text-danger small">{{ error }}</div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <a href="{% url 'accounts:register' %}" class="btn btn-link">Register</a>
        </form>
    </div>
</div>
{% endblock %}
