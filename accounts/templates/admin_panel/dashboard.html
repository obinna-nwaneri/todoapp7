{% extends "base.html" %}
{% load static %}
{% block title %}Admin Dashboard - Todo Manager{% endblock %}
{% block content %}
<section class="admin-dashboard" data-total-users="{{ total_users }}" data-total-tasks="{{ total_tasks }}" data-pending="{{ status_counts.pending }}" data-in-progress="{{ status_counts.in_progress }}" data-completed="{{ status_counts.completed }}">
    <h1>Admin Dashboard</h1>
    <div class="stats-grid">
        <div class="card">
            <h2>Total Users</h2>
            <span class="stat" data-target="total-users">0</span>
        </div>
        <div class="card">
            <h2>Total Tasks</h2>
            <span class="stat" data-target="total-tasks">0</span>
        </div>
        <div class="card">
            <h2>Pending</h2>
            <span class="stat" data-target="pending">0</span>
        </div>
        <div class="card">
            <h2>In Progress</h2>
            <span class="stat" data-target="in-progress">0</span>
        </div>
        <div class="card">
            <h2>Completed</h2>
            <span class="stat" data-target="completed">0</span>
        </div>
    </div>
    <div class="chart-card">
        <canvas id="statusChart" width="400" height="220"></canvas>
    </div>
</section>
<script defer src="{% static 'js/admin.js' %}"></script>
{% endblock %}
