{% extends "base.html" %}
{% block title %}Delete Task - Todo Manager{% endblock %}
{% block content %}
<section class="form-card">
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete "{{ task.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn danger">Delete</button>
        <a class="btn" href="{% url 'home' %}">Cancel</a>
    </form>
</section>
{% endblock %}
