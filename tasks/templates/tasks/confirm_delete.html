{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h1 class="h4 mb-3">Delete Task</h1>
                <p>Are you sure you want to delete <strong>{{ task.title }}</strong>? This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'tasks:dashboard' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
