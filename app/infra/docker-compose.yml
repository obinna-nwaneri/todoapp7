version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: Docapp3
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:admin@db:5432/Docapp3
      JWT_SECRET: dev_jwt_secret_change_me
      COOKIE_SECURE: 'false'
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    depends_on:
      - api
    ports:
      - '5173:5173'
volumes:
  postgres_data:
