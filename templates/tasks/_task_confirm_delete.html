<div class="mx-auto max-w-xl rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200" id="task-{{ task.id }}">
    <h1 class="text-2xl font-semibold text-slate-900">Delete task</h1>
    <p class="mt-2 text-slate-600">Are you sure you want to delete <strong>{{ task.title }}</strong>? This action cannot be undone.</p>
    <form method="post" class="mt-6 flex items-center gap-3" hx-post="{% url 'tasks:delete' task.pk %}" hx-target="#task-{{ task.id }}" hx-swap="outerHTML">
        {% csrf_token %}
        <button type="submit" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-500">Delete</button>
        <button type="button" class="rounded-md border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:text-indigo-600" hx-get="{% url 'tasks:detail' task.pk %}" hx-target="#task-{{ task.id }}" hx-swap="outerHTML">Cancel</button>
    </form>
</div>
