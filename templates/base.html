<!DOCTYPE html>
<html lang="en" x-data="{ mobileMenu: false }" class="h-full bg-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Doctor App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.1/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-bx1cfO+V+BkecxaiNxBlV9msKQ+1WDVYj1WFJsbgx5caX5/C/PObbIVdQydb9h9NP7VDaRao7IhiHBpjz2W6kw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="min-h-full flex flex-col">
<nav class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center space-x-3">
                <a href="/" class="text-xl font-semibold text-blue-600">DocScheduler</a>
            </div>
            <div class="hidden md:flex space-x-4 items-center">
                {% block nav_links %}{% endblock %}
            </div>
            <button class="md:hidden" @click="mobileMenu = !mobileMenu">
                <span class="sr-only">Toggle navigation</span>
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>
    <div class="md:hidden" x-show="mobileMenu" x-transition>
        <div class="px-4 pb-4 space-y-2">
            {% block nav_links_mobile %}{% endblock %}
        </div>
    </div>
</nav>
<main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-6">
        {% if messages %}
            <div class="space-y-2">
                {% for message in messages %}
                    <div class="rounded-md p-4 text-sm font-medium {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200{% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</main>
<footer class="bg-white border-t">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-slate-500 text-center">
        &copy; {% now "Y" %} DocScheduler. All rights reserved.
    </div>
</footer>
</body>
</html>
