{% extends "dashboard_base.html" %}
{% load crispy_forms_filters crispy_forms_tags %}
{% block sidebar %}
    <a href="{% url 'patient:dashboard' %}" class="block px-3 py-2 rounded bg-white shadow">Overview</a>
    <a href="{% url 'patient:appointments' %}" class="block px-3 py-2 rounded bg-white shadow">Appointments</a>
    <a href="{% url 'patient:records' %}" class="block px-3 py-2 rounded bg-white shadow">Records</a>
    <a href="{% url 'patient:profile' %}" class="block px-3 py-2 rounded bg-indigo-600 text-white">Profile</a>
{% endblock %}
{% block dashboard_content %}
<h1 class="text-2xl font-semibold mb-4">Patient profile</h1>
<form method="post" class="bg-white shadow rounded p-6 space-y-4">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Save changes</button>
</form>
{% endblock %}
