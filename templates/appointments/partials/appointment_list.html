{% if appointments %}
<table class="min-w-full divide-y divide-slate-200">
    <thead class="bg-slate-50">
        <tr>
            <th class="px-4 py-2 text-left text-sm font-semibold text-slate-600">Doctor</th>
            <th class="px-4 py-2 text-left text-sm font-semibold text-slate-600">Date</th>
            <th class="px-4 py-2 text-left text-sm font-semibold text-slate-600">Time</th>
            <th class="px-4 py-2 text-left text-sm font-semibold text-slate-600">Status</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-slate-200">
    {% for appointment in appointments %}
        <tr>
            <td class="px-4 py-2 text-sm text-slate-700">
                <div class="font-medium">{{ appointment.doctor.name }}</div>
                <div class="text-xs text-slate-500">{{ appointment.doctor.specialization }}</div>
            </td>
            <td class="px-4 py-2 text-sm text-slate-600">{{ appointment.date }}</td>
            <td class="px-4 py-2 text-sm text-slate-600">{{ appointment.time }}</td>
            <td class="px-4 py-2">
                <span class="text-xs uppercase tracking-wide px-3 py-1 rounded-full {% if appointment.status == 'approved' %}bg-green-100 text-green-700{% elif appointment.status == 'rejected' %}bg-red-100 text-red-700{% else %}bg-yellow-100 text-yellow-700{% endif %}">
                    {{ appointment.get_status_display }}
                </span>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-slate-500">No appointments found.</p>
{% endif %}
