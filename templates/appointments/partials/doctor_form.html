<form hx-post="{% if doctor %}{% url 'doctor_update' doctor.pk %}{% else %}{% url 'doctor_create' %}{% endif %}" hx-target="#doctor-table" hx-swap="outerHTML" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <p class="text-xs text-red-600 mt-1">{{ error }}</p>
            {% endfor %}
        </div>
    {% endfor %}
    <div class="flex justify-end space-x-2">
        <button type="button" class="px-4 py-2 bg-slate-200 rounded" @click="showDoctorModal = false">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
    </div>
</form>
