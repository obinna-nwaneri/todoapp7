<div class="overflow-x-auto rounded-lg bg-white shadow">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead class="bg-slate-50 text-left">
            <tr>
                <th class="px-6 py-3 font-semibold text-slate-600">Name</th>
                <th class="px-6 py-3 font-semibold text-slate-600">Age</th>
                <th class="px-6 py-3 font-semibold text-slate-600">Contact</th>
                <th class="px-6 py-3"></th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 bg-white">
            {% for patient in patients %}
                <tr>
                    <td class="px-6 py-3 font-medium text-slate-800">{{ patient.name }}</td>
                    <td class="px-6 py-3 text-slate-600">{{ patient.age }}</td>
                    <td class="px-6 py-3 text-slate-600">{{ patient.contact_info }}</td>
                    <td class="px-6 py-3 text-right text-sm">
                        <a href="{% url 'admin_panel:patient-edit' patient.pk %}" class="text-indigo-600 hover:text-indigo-500">Edit</a>
                        <form action="{% url 'admin_panel:patient-delete' patient.pk %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="ml-3 text-red-500 hover:text-red-600" onclick="return confirm('Delete patient?')">Delete</button>
                        </form>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4" class="px-6 py-4 text-center text-slate-500">No patients found.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
