{% extends "base.html" %}

{% block title %}My Appointments | DocConnect{% endblock %}

{% block content %}
<div class="space-y-6" x-data="{ search: '{{ query }}', status: '{{ status }}' }">
    <div class="flex flex-wrap items-center justify-between gap-4">
        <h1 class="text-2xl font-semibold text-slate-800">My Appointments</h1>
    </div>
    <div class="grid gap-4 rounded-lg bg-white p-4 shadow sm:grid-cols-2">
        <input type="hidden" name="partial" value="table">
        <input type="search" name="q" x-model="search" hx-get="{% url 'doctor_panel:appointments' %}" hx-trigger="keyup changed delay:300ms" hx-target="#doctor-appointment-results" hx-include='[name='status'], input[name='partial']' placeholder="Search by patient or symptoms" class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500" value="{{ query }}">
        <select name="status" x-model="status" hx-get="{% url 'doctor_panel:appointments' %}" hx-trigger="change" hx-target="#doctor-appointment-results" hx-include='[name='q'], input[name='partial']' class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500">
            <option value="">All statuses</option>
            <option value="pending" {% if status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="approved" {% if status == 'approved' %}selected{% endif %}>Approved</option>
            <option value="rejected" {% if status == 'rejected' %}selected{% endif %}>Rejected</option>
            <option value="completed" {% if status == 'completed' %}selected{% endif %}>Completed</option>
        </select>
    </div>
    <div id="doctor-appointment-results">
        {% include "appointments/doctor/partials/appointment_table.html" %}
    </div>
</div>
{% endblock %}
