<div class="overflow-x-auto rounded-lg bg-white shadow">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead class="bg-slate-50 text-left">
            <tr>
                <th class="px-6 py-3 font-semibold text-slate-600">Patient</th>
                <th class="px-6 py-3 font-semibold text-slate-600">Date</th>
                <th class="px-6 py-3 font-semibold text-slate-600">Symptoms</th>
                <th class="px-6 py-3 font-semibold text-slate-600">Status</th>
                <th class="px-6 py-3 text-right"></th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-200 bg-white" id="doctor-appointment-rows">
            {% for appointment in appointments %}
                {% include "appointments/doctor/partials/appointment_row.html" %}
            {% empty %}
                <tr>
                    <td colspan="5" class="px-6 py-4 text-center text-slate-500">No appointments found.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
