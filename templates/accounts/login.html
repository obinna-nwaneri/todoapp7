{% extends "base.html" %}
{% load crispy_forms_filters %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded p-6">
    <h1 class="text-2xl font-semibold mb-4">Login</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div>
            <label class="block text-sm font-medium">Email or username</label>
            {{ form.username|as_crispy_field }}
        </div>
        <div>
            <label class="block text-sm font-medium">Password</label>
            {{ form.password|as_crispy_field }}
        </div>
        <button class="w-full bg-indigo-600 text-white py-2 rounded">Login</button>
    </form>
    <div class="mt-4 text-sm text-center">
        <a href="{% url 'accounts:register_patient' %}" class="text-indigo-600">Need an account? Sign up</a>
    </div>
</div>
{% endblock %}
