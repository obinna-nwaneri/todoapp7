{% extends "base.html" %}
{% load crispy_forms_filters crispy_forms_tags %}
{% block title %}Patient Registration{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white shadow rounded p-6">
    <h1 class="text-2xl font-semibold mb-4">Create patient account</h1>
    <form method="post" class="grid md:grid-cols-2 gap-4">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="md:col-span-2">
            <button class="w-full bg-indigo-600 text-white py-2 rounded">Register</button>
        </div>
    </form>
</div>
{% endblock %}
